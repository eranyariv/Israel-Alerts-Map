name: Refresh Alert History

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 07:00 Israel time (UTC+2)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest alarms.csv
        run: |
          curl -fsSL "https://raw.githubusercontent.com/yuval-harpaz/alarms/master/data/alarms.csv" \
            -o alarms.csv
          echo "Downloaded $(wc -l < alarms.csv) rows"

      - name: Generate alertHistory.json
        run: python3 build_history.py

      - name: Upload alertHistory.json to Bluehost
        run: |
          curl -s --ftp-create-dirs \
            -T "frontend/public/alertHistory.json" \
            "ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}@${{ secrets.FTP_HOST }}/public_html/map/alertHistory.json"
          echo "Upload complete"
