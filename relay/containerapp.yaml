properties:
  template:
    revisionSuffix: v1-53
    containers:
      - name: redalert-relay
        image: redalertrelay.azurecr.io/redalert-relay:latest
        resources:
          cpu: 1
          memory: 2Gi
        env:
          - name: RA_APIKEY
            secretRef: ra-apikey
          - name: RA_HTTP_KEY
            secretRef: ra-http-key
          - name: GEMINI_API_KEY
            secretRef: gemini-api-key
          - name: ADMIN_PASSWORD
            secretRef: admin-password
          - name: X_CONSUMER_KEY
            secretRef: x-consumer-key
          - name: X_CONSUMER_SECRET
            secretRef: x-consumer-secret
          - name: X_ACCESS_TOKEN
            secretRef: x-access-token
          - name: X_ACCESS_TOKEN_SECRET
            secretRef: x-access-token-secret
        volumeMounts:
          - volumeName: relay-data
            mountPath: /data
    volumes:
      - name: relay-data
        storageType: AzureFile
        storageName: relay-data
    scale:
      minReplicas: 1
      maxReplicas: 1
