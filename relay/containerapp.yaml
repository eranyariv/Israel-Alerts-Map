properties:
  template:
    revisionSuffix: v1-28b
    containers:
      - name: redalert-relay
        image: redalertrelay.azurecr.io/redalert-relay:latest
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: RA_APIKEY
            secretRef: ra-apikey
          - name: RA_HTTP_KEY
            secretRef: ra-http-key
          - name: GEMINI_API_KEY
            secretRef: gemini-api-key
        volumeMounts:
          - volumeName: relay-data
            mountPath: /data
    volumes:
      - name: relay-data
        storageType: AzureFile
        storageName: relay-data
    scale:
      minReplicas: 1
      maxReplicas: 1
